<svg viewBox="0 0 60 120" xmlns="http://www.w3.org/2000/svg">
  <!-- 4 carriles vertical — fondo terreno -->
  <rect width="60" height="120" fill="#c8d8a0"/>
  <!-- veredas laterales -->
  <rect x="0" y="0" width="8" height="120" fill="#b0b0b0"/>
  <rect x="52" y="0" width="8" height="120" fill="#b0b0b0"/>
  <!-- asfalto (4 carriles = 44px) -->
  <rect x="8" y="0" width="44" height="120" fill="#555"/>
  <!-- línea central doble amarilla -->
  <line x1="28" y1="0" x2="28" y2="120" stroke="#ffcc00" stroke-width="1.2"/>
  <line x1="32" y1="0" x2="32" y2="120" stroke="#ffcc00" stroke-width="1.2"/>
  <!-- líneas de carril blancas punteadas (izquierda) -->
  <line x1="18" y1="0" x2="18" y2="120" stroke="white" stroke-width="1" stroke-dasharray="8,6"/>
  <!-- líneas de carril blancas punteadas (derecha) -->
  <line x1="42" y1="0" x2="42" y2="120" stroke="white" stroke-width="1" stroke-dasharray="8,6"/>
  <!-- bordes de calzada -->
  <line x1="8" y1="0" x2="8" y2="120" stroke="#888" stroke-width="1" opacity="0.6"/>
  <line x1="52" y1="0" x2="52" y2="120" stroke="#888" stroke-width="1" opacity="0.6"/>
</svg>
