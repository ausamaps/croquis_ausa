<svg viewBox="0 0 70 55" xmlns="http://www.w3.org/2000/svg">
  <!-- Camión volcador/dumper vista superior, frente a la derecha -->
  <!-- tolva/caja volcadora -->
  <rect x="3" y="8" width="40" height="39" rx="3" fill="#d0a060" stroke="#1a2a3a" stroke-width="1.5"/>
  <!-- interior tolva -->
  <rect x="6" y="11" width="34" height="33" rx="2" fill="#b88040" stroke="#1a2a3a" stroke-width="0.6"/>
  <!-- líneas estructura tolva -->
  <line x1="14" y1="11" x2="14" y2="44" stroke="#1a2a3a" stroke-width="0.5" opacity="0.4"/>
  <line x1="24" y1="11" x2="24" y2="44" stroke="#1a2a3a" stroke-width="0.5" opacity="0.4"/>
  <line x1="34" y1="11" x2="34" y2="44" stroke="#1a2a3a" stroke-width="0.5" opacity="0.4"/>
  <!-- bisagra trasera tolva -->
  <rect x="40" y="18" width="4" height="19" rx="2" fill="#888" stroke="#555" stroke-width="0.5"/>
  <!-- cabina -->
  <rect x="43" y="6" width="24" height="43" rx="5" fill="#8060a0" stroke="#1a2a3a" stroke-width="1.5"/>
  <rect x="45" y="9" width="14" height="20" rx="2" fill="#6040808" stroke="#1a2a3a" stroke-width="0.5"/>
  <rect x="57" y="10" width="8" height="13" rx="2" fill="#c8e0f0" stroke="#1a2a3a" stroke-width="0.8"/>
  <!-- ruedas tolva -->
  <rect x="8" y="2" width="10" height="7" rx="2" fill="#111" stroke="#333" stroke-width="0.5"/>
  <rect x="8" y="46" width="10" height="7" rx="2" fill="#111" stroke="#333" stroke-width="0.5"/>
  <rect x="26" y="2" width="10" height="7" rx="2" fill="#111" stroke="#333" stroke-width="0.5"/>
  <rect x="26" y="46" width="10" height="7" rx="2" fill="#111" stroke="#333" stroke-width="0.5"/>
  <!-- ruedas cabina -->
  <rect x="45" y="2" width="10" height="7" rx="2" fill="#111" stroke="#333" stroke-width="0.5"/>
  <rect x="45" y="46" width="10" height="7" rx="2" fill="#111" stroke="#333" stroke-width="0.5"/>
  <!-- faros -->
  <rect x="65" y="8" width="4" height="8" rx="1" fill="#fffaaa" stroke="#c8a000" stroke-width="0.5"/>
  <rect x="65" y="39" width="4" height="8" rx="1" fill="#fffaaa" stroke="#c8a000" stroke-width="0.5"/>
  <!-- luces traseras -->
  <rect x="3" y="8" width="3" height="6" rx="1" fill="#ff5555" stroke="#aa0000" stroke-width="0.5"/>
  <rect x="3" y="41" width="3" height="6" rx="1" fill="#ff5555" stroke="#aa0000" stroke-width="0.5"/>
</svg>
