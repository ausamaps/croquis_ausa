  <rect x="3" y="4" width="34" height="28" rx="3" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- flecha arriba -->
  <polygon points="20,7 24,13 22,13 22,17 18,17 18,13 16,13" fill="#1a1a1a"/>
  <!-- flecha abajo -->
  <polygon points="20,29 16,23 18,23 18,19 22,19 22,23 24,23" fill="#1a1a1a"/>
  <!-- flecha izquierda -->
  <polygon points="7,18 13,14 13,16 17,16 17,20 13,20 13,22" fill="#1a1a1a"/>
  <!-- flecha derecha -->
  <polygon points="33,18 27,22 27,20 23,20 23,16 27,16 27,14" fill="#1a1a1a"/>
