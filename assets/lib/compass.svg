<svg viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
  <!-- Brújula / indicador Norte -->
  <circle cx="25" cy="25" r="22" fill="white" stroke="#1a2a3a" stroke-width="1.5"/>
  <circle cx="25" cy="25" r="20" fill="#f0f4f8" stroke="#c0d0e0" stroke-width="0.5"/>
  <!-- puntos cardinales marcas -->
  <line x1="25" y1="5" x2="25" y2="9" stroke="#1a2a3a" stroke-width="1.5"/>
  <line x1="25" y1="41" x2="25" y2="45" stroke="#1a2a3a" stroke-width="1"/>
  <line x1="5" y1="25" x2="9" y2="25" stroke="#1a2a3a" stroke-width="1"/>
  <line x1="41" y1="25" x2="45" y2="25" stroke="#1a2a3a" stroke-width="1"/>
  <!-- aguja Norte (roja) -->
  <polygon points="25,7 28,25 25,22 22,25" fill="#cc0000" stroke="#aa0000" stroke-width="0.5"/>
  <!-- aguja Sur (blanca/oscura) -->
  <polygon points="25,43 22,25 25,28 28,25" fill="#888" stroke="#666" stroke-width="0.5"/>
  <!-- círculo central -->
  <circle cx="25" cy="25" r="3" fill="#1a2a3a"/>
  <circle cx="25" cy="25" r="1.5" fill="white"/>
  <!-- letra N -->
  <text x="25" y="17" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="7" font-weight="900" fill="#cc0000">N</text>
  <!-- letra S -->
  <text x="25" y="47" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">S</text>
  <!-- letra E -->
  <text x="46" y="27" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">E</text>
  <!-- letra O -->
  <text x="4" y="27" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">O</text>
</svg>
