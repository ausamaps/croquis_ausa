<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Empalme izquierdo: calle principal vertical, ramal entra desde izquierda -->
  <rect width="100" height="100" fill="#c8d8a0"/>
  <!-- veredas principal -->
  <rect x="58" y="0" width="10" height="100" fill="#b0b0b0"/>
  <rect x="28" y="0" width="10" height="52" fill="#b0b0b0"/>
  <!-- vereda ramal izquierdo -->
  <rect x="0" y="38" width="38" height="10" fill="#b0b0b0"/>
  <rect x="0" y="62" width="38" height="10" fill="#b0b0b0"/>
  <!-- asfalto principal -->
  <rect x="32" y="0" width="30" height="100" fill="#555"/>
  <!-- asfalto ramal izquierdo -->
  <rect x="0" y="42" width="38" height="20" fill="#555"/>
  <!-- línea central principal -->
  <line x1="47" y1="0" x2="47" y2="42" stroke="#ffcc00" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="47" y1="62" x2="47" y2="100" stroke="#ffcc00" stroke-width="1.5" stroke-dasharray="6,4"/>
  <!-- línea central ramal -->
  <line x1="0" y1="52" x2="38" y2="52" stroke="#ffcc00" stroke-width="1.5" stroke-dasharray="6,4"/>
  <!-- bordes -->
  <line x1="62" y1="0" x2="62" y2="100" stroke="#888" stroke-width="1" opacity="0.5"/>
  <line x1="32" y1="0" x2="32" y2="42" stroke="#888" stroke-width="1" opacity="0.5"/>
  <line x1="32" y1="62" x2="32" y2="100" stroke="#888" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="42" x2="38" y2="42" stroke="#888" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="62" x2="38" y2="62" stroke="#888" stroke-width="1" opacity="0.5"/>
</svg>
