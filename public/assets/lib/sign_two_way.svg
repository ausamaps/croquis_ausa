<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <!-- Doble mano — señal blanca con flechas opuestas -->
  <rect x="18" y="32" width="4" height="8" rx="1" fill="#888"/>
  <rect x="3" y="3" width="34" height="29" rx="3" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- flecha derecha (arriba) -->
  <line x1="9" y1="13" x2="31" y2="13" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="34,13 27,9 27,17" fill="#1a1a1a"/>
  <!-- flecha izquierda (abajo) -->
  <line x1="31" y1="23" x2="9" y2="23" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="6,23 13,19 13,27" fill="#1a1a1a"/>
</svg>
