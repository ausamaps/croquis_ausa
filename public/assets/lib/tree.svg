<svg viewBox="0 0 40 50" xmlns="http://www.w3.org/2000/svg">
  <!-- Árbol vista superior — copa circular con tronco -->
  <!-- sombra -->
  <ellipse cx="22" cy="28" rx="15" ry="14" fill="#2a5a20" opacity="0.25"/>
  <!-- copa exterior -->
  <circle cx="20" cy="24" r="16" fill="#3a8a28"/>
  <!-- variaciones de copa (manchas) -->
  <circle cx="14" cy="20" r="7" fill="#48a030" opacity="0.7"/>
  <circle cx="26" cy="18" r="6" fill="#48a030" opacity="0.6"/>
  <circle cx="24" cy="28" r="7" fill="#2e7020" opacity="0.5"/>
  <circle cx="14" cy="28" r="5" fill="#48a030" opacity="0.5"/>
  <!-- brillo copa -->
  <circle cx="16" cy="18" r="4" fill="#60c040" opacity="0.4"/>
  <!-- tronco (visible si la copa no lo tapa del todo) -->
  <ellipse cx="20" cy="44" rx="3" ry="4" fill="#8a6030" stroke="#6a4820" stroke-width="0.8"/>
</svg>
