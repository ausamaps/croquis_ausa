<svg viewBox="0 0 100 45" xmlns="http://www.w3.org/2000/svg">
  <!-- Semi-trailer vista superior, frente a la derecha -->
  <!-- Trailer/semirremolque -->
  <rect x="3" y="6" width="62" height="33" rx="3" fill="#c8d0d8" stroke="#1a2a3a" stroke-width="1.5"/>
  <!-- detalles del trailer -->
  <rect x="6" y="9" width="56" height="27" rx="2" fill="#b0b8c0" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="20" y1="9" x2="20" y2="36" stroke="#1a2a3a" stroke-width="0.5" opacity="0.4"/>
  <line x1="37" y1="9" x2="37" y2="36" stroke="#1a2a3a" stroke-width="0.5" opacity="0.4"/>
  <line x1="54" y1="9" x2="54" y2="36" stroke="#1a2a3a" stroke-width="0.5" opacity="0.4"/>
  <!-- enganche -->
  <rect x="64" y="19" width="5" height="7" rx="1" fill="#888" stroke="#1a2a3a" stroke-width="0.5"/>
  <!-- Cabina -->
  <rect x="68" y="4" width="28" height="37" rx="5" fill="#7090b0" stroke="#1a2a3a" stroke-width="1.5"/>
  <!-- parabrisas -->
  <rect x="85" y="8" width="8" height="14" rx="2" fill="#c8e0f0" stroke="#1a2a3a" stroke-width="0.8"/>
  <!-- cabina interior -->
  <rect x="70" y="8" width="16" height="18" rx="2" fill="#5878a0" stroke="#1a2a3a" stroke-width="0.5"/>
  <!-- ruedas trailer izq -->
  <rect x="8" y="1" width="8" height="5" rx="1.5" fill="#111" stroke="#333" stroke-width="0.5"/>
  <rect x="8" y="39" width="8" height="5" rx="1.5" fill="#111" stroke="#333" stroke-width="0.5"/>
  <rect x="42" y="1" width="8" height="5" rx="1.5" fill="#111" stroke="#333" stroke-width="0.5"/>
  <rect x="42" y="39" width="8" height="5" rx="1.5" fill="#111" stroke="#333" stroke-width="0.5"/>
  <!-- ruedas cabina -->
  <rect x="70" y="1" width="8" height="5" rx="1.5" fill="#111" stroke="#333" stroke-width="0.5"/>
  <rect x="70" y="39" width="8" height="5" rx="1.5" fill="#111" stroke="#333" stroke-width="0.5"/>
  <rect x="86" y="1" width="8" height="5" rx="1.5" fill="#111" stroke="#333" stroke-width="0.5"/>
  <rect x="86" y="39" width="8" height="5" rx="1.5" fill="#111" stroke="#333" stroke-width="0.5"/>
  <!-- faros frente -->
  <rect x="94" y="6" width="4" height="7" rx="1" fill="#fffaaa" stroke="#c8a000" stroke-width="0.5"/>
  <rect x="94" y="32" width="4" height="7" rx="1" fill="#fffaaa" stroke="#c8a000" stroke-width="0.5"/>
  <!-- luces trailer atrás -->
  <rect x="3" y="6" width="3" height="5" rx="1" fill="#ff5555" stroke="#aa0000" stroke-width="0.5"/>
  <rect x="3" y="34" width="3" height="5" rx="1" fill="#ff5555" stroke="#aa0000" stroke-width="0.5"/>
</svg>
