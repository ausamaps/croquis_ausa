<svg viewBox="0 0 40 70" xmlns="http://www.w3.org/2000/svg">
  <!-- SUV/crossover: más ancho visualmente, techo plano -->
  <rect x="3" y="4" width="34" height="62" rx="6" fill="#b0c8e0" stroke="#1a2a3a" stroke-width="1.5"/>
  <!-- parabrisas más inclinado -->
  <path d="M8 11 L32 11 L31 21 L9 21 Z" fill="#d8eef8" stroke="#1a2a3a" stroke-width="0.8"/>
  <!-- techo plano grande -->
  <rect x="9" y="21" width="22" height="26" rx="2" fill="#8aaccc" stroke="#1a2a3a" stroke-width="0.5"/>
  <!-- luna trasera casi vertical -->
  <path d="M9 47 L31 47 L32 58 L8 58 Z" fill="#d8eef8" stroke="#1a2a3a" stroke-width="0.8"/>
  <!-- barras de techo -->
  <line x1="9" y1="27" x2="31" y2="27" stroke="#6a90b0" stroke-width="1" opacity="0.6"/>
  <line x1="9" y1="38" x2="31" y2="38" stroke="#6a90b0" stroke-width="1" opacity="0.6"/>
  <!-- ruedas más grandes -->
  <rect x="0" y="8" width="5" height="13" rx="2" fill="#111" stroke="#333" stroke-width="0.5"/>
  <rect x="35" y="8" width="5" height="13" rx="2" fill="#111" stroke="#333" stroke-width="0.5"/>
  <rect x="0" y="49" width="5" height="13" rx="2" fill="#111" stroke="#333" stroke-width="0.5"/>
  <rect x="35" y="49" width="5" height="13" rx="2" fill="#111" stroke="#333" stroke-width="0.5"/>
  <rect x="5" y="4" width="10" height="4" rx="1.5" fill="#fffaaa" stroke="#c8a000" stroke-width="0.5"/>
  <rect x="25" y="4" width="10" height="4" rx="1.5" fill="#fffaaa" stroke="#c8a000" stroke-width="0.5"/>
  <rect x="5" y="62" width="10" height="4" rx="1.5" fill="#ff5555" stroke="#aa0000" stroke-width="0.5"/>
  <rect x="25" y="62" width="10" height="4" rx="1.5" fill="#ff5555" stroke="#aa0000" stroke-width="0.5"/>
</svg>
