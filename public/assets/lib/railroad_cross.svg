<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Cruce ferroviario: calle horizontal + vías diagonales -->
  <rect width="100" height="100" fill="#c8d8a0"/>
  <!-- veredas calle horizontal -->
  <rect x="0" y="30" width="100" height="10" fill="#b0b0b0"/>
  <rect x="0" y="60" width="100" height="10" fill="#b0b0b0"/>
  <!-- asfalto calle horizontal -->
  <rect x="0" y="34" width="100" height="32" fill="#555"/>
  <!-- línea central calle -->
  <line x1="0" y1="50" x2="100" y2="50" stroke="#ffcc00" stroke-width="1.5" stroke-dasharray="6,4"/>
  <!-- bordes calle -->
  <line x1="0" y1="34" x2="100" y2="34" stroke="#888" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="66" x2="100" y2="66" stroke="#888" stroke-width="1" opacity="0.5"/>
  <!-- vías del tren (diagonales) -->
  <line x1="0" y1="0" x2="100" y2="100" stroke="#8a6a40" stroke-width="8" stroke-linecap="round"/>
  <line x1="0" y1="0" x2="100" y2="100" stroke="#c8a870" stroke-width="4" stroke-linecap="round"/>
  <!-- durmientes (traviesas) -->
  <line x1="8" y1="0" x2="0" y2="8" stroke="#7a5a30" stroke-width="3" stroke-linecap="round"/>
  <line x1="22" y1="0" x2="0" y2="22" stroke="#7a5a30" stroke-width="3" stroke-linecap="round"/>
  <line x1="36" y1="0" x2="0" y2="36" stroke="#7a5a30" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="64" x2="64" y2="100" stroke="#7a5a30" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="78" x2="78" y2="100" stroke="#7a5a30" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="92" x2="92" y2="100" stroke="#7a5a30" stroke-width="3" stroke-linecap="round"/>
  <!-- señal de cruce ferroviario (X) -->
  <circle cx="82" cy="20" r="10" fill="white" stroke="#cc0000" stroke-width="2"/>
  <line x1="76" y1="14" x2="88" y2="26" stroke="#cc0000" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="88" y1="14" x2="76" y2="26" stroke="#cc0000" stroke-width="2.5" stroke-linecap="round"/>
  <!-- barreras -->
  <line x1="14" y1="34" x2="34" y2="34" stroke="#cc0000" stroke-width="3" stroke-linecap="round"/>
  <line x1="66" y1="66" x2="86" y2="66" stroke="#cc0000" stroke-width="3" stroke-linecap="round"/>
</svg>
